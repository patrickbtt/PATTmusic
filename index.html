<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PATT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #FFFFFF;
      --muted: #666;
      --muted2: #999;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 0 80px 0;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 460px;
      padding: 0 18px;
      position: relative;
      z-index: 1;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 0 28px;
    }

    .hero-photo {
      width: 100%;
      height: 400px;
      overflow: hidden;
      border-radius: 20px;
      margin-bottom: 28px;
      position: relative;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
    }

    .hero-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(8,8,8,0.8) 100%);
      border-radius: 20px;
    }

    .hero-name {
      font-family: 'Space Grotesk', 'Arial Black', sans-serif;
      font-size: 64px;
      font-weight: 800;
      letter-spacing: 6px;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 60%, rgba(255,255,255,0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-bio {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted2);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── SOCIALS ── */
    .socials {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted2);
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(10px);
    }

    .social-icon:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 40px 0 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── FEATURED CARD ── */
    .featured-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      display: block;
      position: relative;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(10px);
    }

    .featured-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .featured-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .featured-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.75;
      transition: opacity 0.3s, transform 0.4s;
    }

    .featured-card:hover .featured-thumb img {
      opacity: 0.9;
      transform: scale(1.03);
    }

    .featured-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
    }

    .play-btn {
      position: relative;
      z-index: 2;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .featured-card:hover .play-btn {
      background: rgba(255,255,255,0.25);
      transform: scale(1.08);
    }

    .play-btn svg { width: 20px; height: 20px; fill: white; margin-left: 3px; }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 3;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .featured-info {
      padding: 16px 20px 20px;
    }

    .featured-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
      margin-bottom: 4px;
    }

    .featured-sub {
      font-size: 12px;
      color: var(--muted2);
    }

    /* ── LINK CARDS ── */
    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
      backdrop-filter: blur(10px);
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6), transparent);
      transform: scaleY(0);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      border-radius: 2px;
    }

    .link-card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateX(4px);
    }

    .link-card:hover::before { transform: scaleY(1); }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .link-card:hover .link-icon { background: rgba(255,255,255,0.1); }

    .link-icon svg { width: 16px; height: 16px; fill: var(--muted2); }

    .link-text { flex: 1; }
    .link-title { font-size: 14px; font-weight: 500; letter-spacing: 0.1px; }
    .link-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .link-arrow {
      color: var(--muted);
      font-size: 16px;
      transition: transform 0.2s, color 0.2s;
    }
    .link-card:hover .link-arrow { transform: translateX(3px); color: var(--muted2); }

    /* ── TRACK CARD ── */
    .track-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      margin-bottom: 10px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .track-card::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6), transparent);
      transform: scaleY(0);
      transition: transform 0.25s;
      border-radius: 2px;
    }

    .track-card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateX(4px);
    }

    .track-card:hover::before { transform: scaleY(1); }

    .track-art {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }

    .track-info { flex: 1; }
    .track-title { font-size: 13px; font-weight: 500; }
    .track-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .track-play { color: var(--muted); transition: color 0.2s; }
    .track-card:hover .track-play { color: var(--muted2); }
    .track-play svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 56px;
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let t = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particules fines
const particles = Array.from({length: 120}, () => ({
  x: Math.random(),
  y: Math.random(),
  size: Math.random() * 1.4 + 0.2,
  speed: 0.00008 + Math.random() * 0.00018,
  opacity: Math.random() * 0.35 + 0.05,
  drift: (Math.random() - 0.5) * 0.0002,
}));

// Lignes lumineuses horizontales
const lines = Array.from({length: 6}, (_, i) => ({
  y: Math.random(),
  speed: 0.00015 + Math.random() * 0.0002,
  opacity: 0.04 + Math.random() * 0.06,
  width: 0.4 + Math.random() * 0.4,
}));

// Orbes lumineux
const orbs = [
  { x: 0.2, y: 0.3, r: 280, ox: 0.08, oy: 0.06, phase: 0 },
  { x: 0.8, y: 0.7, r: 220, ox: 0.06, oy: 0.09, phase: 2 },
  { x: 0.5, y: 0.5, r: 180, ox: 0.05, oy: 0.05, phase: 4 },
];

function draw() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Orbes subtils blanc/gris
  orbs.forEach(o => {
    const cx = (o.x + Math.sin(t * 0.003 + o.phase) * o.ox) * canvas.width;
    const cy = (o.y + Math.cos(t * 0.002 + o.phase) * o.oy) * canvas.height;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, o.r);
    g.addColorStop(0, 'rgba(255,255,255,0.04)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.015)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, o.r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  });

  // Lignes horizontales qui dérivent
  lines.forEach(l => {
    l.y += l.speed;
    if (l.y > 1) l.y = 0;
    const y = l.y * canvas.height;
    const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5 - l.width/2, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, `rgba(255,255,255,${l.opacity})`);
    grad.addColorStop(0.5 + l.width/2, 'rgba(255,255,255,0)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y - 0.5, canvas.width, 1.5);
  });

  // Grille très fine
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 1; i < 6; i++) {
    const x = (i / 6) * canvas.width;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let i = 1; i < 10; i++) {
    const y = (i / 10) * canvas.height;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Particules flottantes
  particles.forEach(p => {
    p.y -= p.speed;
    p.x += p.drift;
    if (p.y < 0) { p.y = 1; p.x = Math.random(); }
    if (p.x < 0 || p.x > 1) p.drift *= -1;
    const twinkle = p.opacity * (0.5 + Math.sin(t * 0.04 + p.x * 30) * 0.5);
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
    ctx.fill();
  });

  // Vignette
  const vig = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height * 0.2,
    canvas.width/2, canvas.height/2, canvas.height * 1.2
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  t += 1;
  requestAnimationFrame(draw);
}
draw();
</script>
