<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PATT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --card: #141414;
      --card-hover: #1E1E1E;
      --border: #2A2A2A;
      --text: #FFFFFF;
      --muted: #666666;
      --accent: #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 0 60px 0;
    }

    .page {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      position:relative;
      z-index:1;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 0 32px;
      gap: 0;
    }

    .avatar-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      overflow: hidden;
      margin-bottom: 18px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-placeholder {
      font-family: 'Arial Black', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 1px;
    }

    .hero-name {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: 66px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .hero-bio {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── SOCIAL ICONS ROW ── */
    .socials {
      display: flex;
      gap: 20px;
      margin-top: 22px;
      align-items: center;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .social-icon:hover {
      color: var(--text);
      border-color: #555;
    }

    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 36px 0 12px;
    }

    /* ── FEATURED CARD (DJ SET) ── */
    .featured-card {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      display: block;
      position: relative;
      transition: border-color 0.2s;
    }

    .featured-card:hover { border-color: #444; }

    .featured-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .featured-thumb-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #111 0%, #1a1a1a 50%, #0d0d0d 100%);
    }

    .featured-thumb-text {
      position: relative;
      font-family: 'Arial Black', sans-serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 10px;
      color: rgba(255,255,255,0.06);
      user-select: none;
    }

    .play-btn {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .featured-card:hover .play-btn { background: rgba(255,255,255,0.2); }

    .play-btn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .featured-info {
      padding: 16px 18px 18px;
    }

    .featured-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 4px;
    }

    .featured-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── LINK CARDS ── */
    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      bottom: 10%;
      width: 2px;
      background: var(--text);
      transform: scaleY(0);
      transition: transform 0.2s;
      border-radius: 0 2px 2px 0;
    }

    .link-card:hover {
      background: var(--card-hover);
      border-color: #333;
    }

    .link-card:hover::before { transform: scaleY(1); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #1F1F1F;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 16px; height: 16px; fill: var(--muted); }

    .link-text { flex: 1; }
    .link-title { font-size: 14px; font-weight: 500; }
    .link-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .link-arrow { color: var(--muted); font-size: 14px; transition: transform 0.15s; }
    .link-card:hover .link-arrow { transform: translateX(2px); }

    /* ── TRACK CARD ── */
    .track-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 10px;
      overflow: hidden;
      position: relative;
    }

    .track-card::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 2px;
      background: var(--text);
      transform: scaleY(0);
      transition: transform 0.2s;
      border-radius: 0 2px 2px 0;
    }

    .track-card:hover { background: var(--card-hover); border-color: #333; }
    .track-card:hover::before { transform: scaleY(1); }

    .track-art {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      background: #1F1F1F;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .track-info { flex: 1; }
    .track-title { font-size: 13px; font-weight: 500; }
    .track-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .track-play { color: var(--muted); }
    .track-play svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.5px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }


    body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0a0a0a 0%, #0d0a1a 50%, #0a0a0a 100%);
  animation: bgshift 8s ease-in-out infinite alternate;
}

@keyframes bgshift {
  0%   { background: linear-gradient(135deg, #0a0a0a 0%, #0d0a1a 100%); }
  50%  { background: linear-gradient(135deg, #0a0d1a 0%, #0a0a0a 100%); }
  100% { background: linear-gradient(135deg, #100a1a 0%, #0a0d10 100%); }
}

  y: Math.random(),
  size: Math.random() * 1.2 + 0.3,
  speed: Math.random() * 0.0002 + 0.0001,
  opacity: Math.random() * 0.3 + 0.05,
}));

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ciel sunset dégradé
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0,    '#0a0510');
  sky.addColorStop(0.35, '#1a0820');
  sky.addColorStop(0.55, '#3d1020');
  sky.addColorStop(0.72, '#c4401a');
  sky.addColorStop(0.85, '#e8761a');
  sky.addColorStop(1,    '#f0a050');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Soleil
  const sunY = canvas.height * (0.72 + Math.sin(t * 0.002) * 0.01);
  const sunX = canvas.width * 0.5;
  const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, canvas.width * 0.25);
  sun.addColorStop(0,    'rgba(255,220,100,0.9)');
  sun.addColorStop(0.15, 'rgba(255,160,50,0.5)');
  sun.addColorStop(0.4,  'rgba(220,80,20,0.2)');
  sun.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = sun;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Reflet sur l'eau
  const horizon = canvas.height * 0.72;
  for (let i = 0; i < 18; i++) {
    const ry = horizon + i * (canvas.height - horizon) / 18;
    const rw = (30 + i * 8 + Math.sin(t * 0.05 + i) * 12);
    const rx = sunX - rw / 2 + Math.sin(t * 0.03 + i * 0.7) * 6;
    const alpha = 0.08 - i * 0.004;
    ctx.fillStyle = `rgba(255,200,80,${Math.max(alpha, 0)})`;
    ctx.fillRect(rx, ry, rw, 2.5);
  }

  // Vagues horizon
  ctx.beginPath();
  ctx.moveTo(0, horizon);
  for (let x = 0; x <= canvas.width; x += 4) {
    const wave = Math.sin(x * 0.015 + t * 0.04) * 3 + Math.sin(x * 0.03 + t * 0.025) * 1.5;
    ctx.lineTo(x, horizon + wave);
  }
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.closePath();
  const sea = ctx.createLinearGradient(0, horizon, 0, canvas.height);
  sea.addColorStop(0,   'rgba(180,60,20,0.6)');
  sea.addColorStop(0.3, 'rgba(100,30,10,0.7)');
  sea.addColorStop(1,   'rgba(10,5,15,0.95)');
  ctx.fillStyle = sea;
  ctx.fill();

  // Étoiles
  particles.forEach(p => {
    if (p.y > 0.5) return;
    p.y -= p.speed * 0.3;
    if (p.y < 0) p.y = 0.5;
    const twinkle = p.opacity * (0.7 + Math.sin(t * 0.1 + p.x * 10) * 0.3);
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,200,${twinkle})`;
    ctx.fill();
  });

  // Vignette
  const vig = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height * 0.2,
    canvas.width/2, canvas.height/2, canvas.height * 1.1
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  t += 1;
  requestAnimationFrame(draw);
}
draw();
</script>
